# =============================================================================
# Lucid Linux System Configuration
# =============================================================================
# File: /etc/lucidos/lucidos.conf
#
# This is the main system configuration file for Lucid Linux-specific settings.
# It is read by Lucid Linux tools and scripts.
#
# Format: KEY=VALUE
# Lines starting with # are comments.
# Blank lines are ignored.
# =============================================================================

# --- System Identity ---
LUCID_VERSION="0.2"
LUCID_CODENAME="glass"
LUCID_PHASE="alpha"
LUCID_RELEASE_DATE="2026-05-21"

# --- Agent Settings ---
# Whether the Lucid Agent is enabled system-wide
LUCID_AGENT_ENABLED=true

# Path to the agent installation directory
LUCID_AGENT_DIR="/opt/lucid-agent"

# Path to the system-level agent policy
LUCID_AGENT_POLICY="/etc/lucid/agent-policy.json"

# Path to the agent log directory
LUCID_AGENT_LOG_DIR="/opt/lucid-agent/logs"

# Maximum log file size before rotation (in KB)
LUCID_AGENT_MAX_LOG_SIZE_KB=10240

# --- UI Settings ---
# Default desktop theme identifier
LUCID_THEME="lucid-glass"

# Default wallpaper path
LUCID_WALLPAPER="/usr/share/backgrounds/lucid-wallpaper.svg"

# --- Live Session Settings ---
# Default live username
LUCID_LIVE_USER="lucid"

# Default live hostname
LUCID_LIVE_HOSTNAME="lucid"

# --- Feature Flags ---
# These enable or disable specific LucidOS features.
# Set to 'true' or 'false'.

# Show the welcome message on first login
LUCID_SHOW_WELCOME=true

# Enable blur/transparency effects in KDE
# Disable if performance is poor on the hardware
LUCID_ENABLE_BLUR=true

# Show the "Install LucidOS" icon on the desktop in live session
LUCID_SHOW_INSTALLER_ICON=true

# --- Future: AI Provider Settings ---
# These settings will be used when AI integration is added in Alpha 0.3+
# Do NOT store API keys here â€” use ~/.config/lucidos-agent/credentials instead

# AI provider to use (local, openai, anthropic, custom)
# TODO (Alpha 0.4): Implement this setting
LUCID_AI_PROVIDER="local"

# Path to local model files (for local LLM)
# TODO (Alpha 0.4): Implement this setting
LUCID_LOCAL_MODEL_PATH=""

# --- Compatibility Aliases ---
LUCIDOS_VERSION="${LUCID_VERSION}"
LUCIDOS_AGENT_ENABLED="${LUCID_AGENT_ENABLED}"
