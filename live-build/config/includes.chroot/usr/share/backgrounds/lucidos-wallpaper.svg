<?xml version="1.0" encoding="UTF-8"?>
<!--
  LucidOS Wallpaper — lucidos-wallpaper.svg
  ============================================================
  Original abstract "Lucid Glass" wallpaper for LucidOS Alpha 0.1.

  Design intent:
  - Deep midnight navy base fading to dark teal/indigo
  - Translucent glass-like layered ellipses suggest depth and luminosity
  - Subtle light scatter and refraction effects
  - Color palette: deep navy (#0a0e1a), midnight blue (#111827),
    electric indigo (#3730a3), glass teal (#0d9488), soft violet (#7c3aed),
    luminous cyan (#06b6d4)
  - Completely original — no Apple, no brand logos, no copyrighted art
  - Suitable for both dark theme backgrounds and login screens

  License: Original work, freely usable as part of LucidOS.
  TODO (Alpha 0.2): Replace with a professionally crafted SVG or PNG wallpaper.
  ============================================================
-->
<svg
  xmlns="http://www.w3.org/2000/svg"
  xmlns:xlink="http://www.w3.org/1999/xlink"
  width="3840"
  height="2160"
  viewBox="0 0 3840 2160"
  version="1.1">

  <defs>
    <!-- Primary deep background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#060914" stop-opacity="1"/>
      <stop offset="35%"  stop-color="#0a1128" stop-opacity="1"/>
      <stop offset="65%"  stop-color="#0f1a3d" stop-opacity="1"/>
      <stop offset="100%" stop-color="#080c1f" stop-opacity="1"/>
    </linearGradient>

    <!-- Radial glow — upper left, blue-violet -->
    <radialGradient id="glow1" cx="20%" cy="18%" r="50%">
      <stop offset="0%"   stop-color="#3730a3" stop-opacity="0.55"/>
      <stop offset="50%"  stop-color="#1e1b4b" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#060914" stop-opacity="0"/>
    </radialGradient>

    <!-- Radial glow — lower right, teal -->
    <radialGradient id="glow2" cx="80%" cy="85%" r="55%">
      <stop offset="0%"   stop-color="#0d9488" stop-opacity="0.50"/>
      <stop offset="40%"  stop-color="#134e4a" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#060914" stop-opacity="0"/>
    </radialGradient>

    <!-- Radial glow — center right, violet/magenta -->
    <radialGradient id="glow3" cx="75%" cy="30%" r="40%">
      <stop offset="0%"   stop-color="#7c3aed" stop-opacity="0.35"/>
      <stop offset="60%"  stop-color="#2e1065" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#060914" stop-opacity="0"/>
    </radialGradient>

    <!-- Radial glow — lower left, cyan accent -->
    <radialGradient id="glow4" cx="15%" cy="78%" r="40%">
      <stop offset="0%"   stop-color="#06b6d4" stop-opacity="0.25"/>
      <stop offset="60%"  stop-color="#0c4a6e" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#060914" stop-opacity="0"/>
    </radialGradient>

    <!-- Glass orb gradients — translucent layered ellipses -->
    <radialGradient id="orb1" cx="35%" cy="25%" r="60%">
      <stop offset="0%"   stop-color="#a5b4fc" stop-opacity="0.12"/>
      <stop offset="50%"  stop-color="#6366f1" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#4338ca" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="orb2" cx="60%" cy="70%" r="60%">
      <stop offset="0%"   stop-color="#5eead4" stop-opacity="0.10"/>
      <stop offset="50%"  stop-color="#0d9488" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#134e4a" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="orb3" cx="80%" cy="40%" r="70%">
      <stop offset="0%"   stop-color="#c4b5fd" stop-opacity="0.09"/>
      <stop offset="60%"  stop-color="#7c3aed" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#2e1065" stop-opacity="0"/>
    </radialGradient>

    <!-- Specular highlight — sharp bright edge on glass orb -->
    <radialGradient id="specular1" cx="25%" cy="15%" r="40%">
      <stop offset="0%"   stop-color="#e0e7ff" stop-opacity="0.18"/>
      <stop offset="40%"  stop-color="#c7d2fe" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#4f46e5" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="specular2" cx="70%" cy="55%" r="30%">
      <stop offset="0%"   stop-color="#ccfbf1" stop-opacity="0.15"/>
      <stop offset="40%"  stop-color="#5eead4" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#0d9488" stop-opacity="0"/>
    </radialGradient>

    <!-- Blur filter for soft glow edges -->
    <filter id="softBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="60"/>
    </filter>

    <filter id="lightBlur" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="20"/>
    </filter>

    <filter id="microBlur" x="-5%" y="-5%" width="110%" height="110%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>

    <!-- Glass edge stroke -->
    <filter id="glassEdge">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- ======================================================= -->
  <!-- Layer 1: Background                                      -->
  <!-- ======================================================= -->
  <rect width="3840" height="2160" fill="url(#bgGrad)"/>

  <!-- ======================================================= -->
  <!-- Layer 2: Ambient light glows (soft, blurred)            -->
  <!-- ======================================================= -->
  <ellipse cx="768"  cy="388"  rx="1400" ry="900"  fill="url(#glow1)" filter="url(#softBlur)"/>
  <ellipse cx="3072" cy="1836" rx="1600" ry="1000" fill="url(#glow2)" filter="url(#softBlur)"/>
  <ellipse cx="2880" cy="648"  rx="1200" ry="800"  fill="url(#glow3)" filter="url(#softBlur)"/>
  <ellipse cx="576"  cy="1685" rx="1000" ry="700"  fill="url(#glow4)" filter="url(#softBlur)"/>

  <!-- ======================================================= -->
  <!-- Layer 3: Large glass orbs — translucent depth layers    -->
  <!-- ======================================================= -->

  <!-- Large back orb — left center (deep indigo glass) -->
  <ellipse
    cx="900" cy="1100" rx="900" ry="700"
    fill="url(#orb1)"
    stroke="#818cf8" stroke-width="1.5" stroke-opacity="0.15"
    filter="url(#lightBlur)"
  />

  <!-- Large back orb — right lower (teal glass) -->
  <ellipse
    cx="2900" cy="1500" rx="1000" ry="750"
    fill="url(#orb2)"
    stroke="#2dd4bf" stroke-width="1.5" stroke-opacity="0.12"
    filter="url(#lightBlur)"
  />

  <!-- Medium orb — upper right (violet glass) -->
  <ellipse
    cx="2950" cy="600" rx="700" ry="550"
    fill="url(#orb3)"
    stroke="#a78bfa" stroke-width="1" stroke-opacity="0.18"
    filter="url(#lightBlur)"
  />

  <!-- ======================================================= -->
  <!-- Layer 4: Glass panels — frosted glass rectangles        -->
  <!-- ======================================================= -->

  <!-- Main glass panel — upper left -->
  <rect
    x="180" y="220" width="1200" height="680" rx="40" ry="40"
    fill="#6366f1" fill-opacity="0.04"
    stroke="#a5b4fc" stroke-width="1.2" stroke-opacity="0.20"
    filter="url(#microBlur)"
  />

  <!-- Secondary glass panel — lower right -->
  <rect
    x="2460" y="1300" width="1100" height="620" rx="36" ry="36"
    fill="#0d9488" fill-opacity="0.04"
    stroke="#5eead4" stroke-width="1.2" stroke-opacity="0.18"
    filter="url(#microBlur)"
  />

  <!-- Accent glass panel — center -->
  <rect
    x="1200" y="700" width="1440" height="760" rx="50" ry="50"
    fill="#7c3aed" fill-opacity="0.03"
    stroke="#c4b5fd" stroke-width="1" stroke-opacity="0.12"
    filter="url(#microBlur)"
  />

  <!-- Small floating glass chip — top right -->
  <rect
    x="3100" y="180" width="400" height="220" rx="20" ry="20"
    fill="#06b6d4" fill-opacity="0.05"
    stroke="#67e8f9" stroke-width="1" stroke-opacity="0.22"
    filter="url(#microBlur)"
  />

  <!-- Small floating glass chip — bottom left -->
  <rect
    x="160" y="1700" width="500" height="280" rx="24" ry="24"
    fill="#4f46e5" fill-opacity="0.05"
    stroke="#818cf8" stroke-width="1" stroke-opacity="0.20"
    filter="url(#microBlur)"
  />

  <!-- ======================================================= -->
  <!-- Layer 5: Specular highlights — the "glass shine"        -->
  <!-- The bright edge that makes it look like real glass      -->
  <!-- ======================================================= -->

  <!-- Specular on main orb -->
  <ellipse
    cx="680" cy="780" rx="320" ry="180"
    fill="url(#specular1)"
    filter="url(#lightBlur)"
  />

  <!-- Specular on teal orb -->
  <ellipse
    cx="2650" cy="1200" rx="280" ry="160"
    fill="url(#specular2)"
    filter="url(#lightBlur)"
  />

  <!-- ======================================================= -->
  <!-- Layer 6: Fine particle lights — scattered light dots    -->
  <!-- These simulate light refracting through glass           -->
  <!-- ======================================================= -->

  <!-- Indigo particle cluster -->
  <circle cx="420"  cy="340"  r="2.5" fill="#a5b4fc" fill-opacity="0.60"/>
  <circle cx="560"  cy="480"  r="1.8" fill="#818cf8" fill-opacity="0.45"/>
  <circle cx="340"  cy="580"  r="3.0" fill="#c7d2fe" fill-opacity="0.35"/>
  <circle cx="720"  cy="260"  r="2.0" fill="#a5b4fc" fill-opacity="0.50"/>
  <circle cx="650"  cy="420"  r="1.5" fill="#e0e7ff" fill-opacity="0.40"/>

  <!-- Teal particle cluster -->
  <circle cx="2820" cy="1680" r="2.5" fill="#5eead4" fill-opacity="0.55"/>
  <circle cx="3050" cy="1820" r="1.8" fill="#2dd4bf" fill-opacity="0.45"/>
  <circle cx="2950" cy="1560" r="3.0" fill="#99f6e4" fill-opacity="0.30"/>
  <circle cx="3180" cy="1720" r="2.0" fill="#5eead4" fill-opacity="0.50"/>
  <circle cx="2700" cy="1900" r="1.5" fill="#ccfbf1" fill-opacity="0.35"/>

  <!-- Violet particle cluster -->
  <circle cx="3100" cy="480"  r="2.0" fill="#c4b5fd" fill-opacity="0.50"/>
  <circle cx="3250" cy="380"  r="1.5" fill="#ddd6fe" fill-opacity="0.40"/>
  <circle cx="2960" cy="300"  r="2.5" fill="#a78bfa" fill-opacity="0.45"/>
  <circle cx="3350" cy="520"  r="1.8" fill="#c4b5fd" fill-opacity="0.35"/>

  <!-- Cyan scatter -->
  <circle cx="200"  cy="1800" r="2.0" fill="#67e8f9" fill-opacity="0.45"/>
  <circle cx="380"  cy="1950" r="1.5" fill="#a5f3fc" fill-opacity="0.35"/>
  <circle cx="520"  cy="1820" r="2.5" fill="#06b6d4" fill-opacity="0.40"/>

  <!-- Center scatter -->
  <circle cx="1920" cy="800"  r="1.8" fill="#818cf8" fill-opacity="0.30"/>
  <circle cx="2100" cy="1100" r="2.0" fill="#5eead4" fill-opacity="0.25"/>
  <circle cx="1750" cy="1300" r="1.5" fill="#a78bfa" fill-opacity="0.30"/>
  <circle cx="2000" cy="1500" r="2.2" fill="#67e8f9" fill-opacity="0.22"/>

  <!-- ======================================================= -->
  <!-- Layer 7: Thin line accents — circuit-like light traces  -->
  <!-- ======================================================= -->

  <!-- Horizontal trace lines (subtle) -->
  <line x1="0" y1="540"  x2="3840" y2="540"  stroke="#6366f1" stroke-width="0.5" stroke-opacity="0.08"/>
  <line x1="0" y1="1080" x2="3840" y2="1080" stroke="#0d9488" stroke-width="0.5" stroke-opacity="0.07"/>
  <line x1="0" y1="1620" x2="3840" y2="1620" stroke="#7c3aed" stroke-width="0.4" stroke-opacity="0.06"/>

  <!-- Diagonal accent trace -->
  <line x1="0" y1="0" x2="3840" y2="2160" stroke="#818cf8" stroke-width="0.8" stroke-opacity="0.05"/>
  <line x1="3840" y1="0" x2="0" y2="2160" stroke="#5eead4" stroke-width="0.6" stroke-opacity="0.04"/>

  <!-- ======================================================= -->
  <!-- Layer 8: Corner vignette — darkens edges slightly       -->
  <!-- This makes the center feel more luminous                -->
  <!-- ======================================================= -->
  <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
    <stop offset="0%"   stop-color="#000000" stop-opacity="0"/>
    <stop offset="100%" stop-color="#000000" stop-opacity="0.55"/>
  </radialGradient>
  <rect width="3840" height="2160" fill="url(#vignette)"/>

</svg>
