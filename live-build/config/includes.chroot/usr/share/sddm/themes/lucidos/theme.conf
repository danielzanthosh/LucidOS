[SddmGreeterSettings]
# =============================================================================
# LucidOS SDDM Theme Configuration
# =============================================================================
# This file controls the appearance of the LucidOS login screen.
# It is read by SDDM when the 'lucidos' theme is selected.
#
# To change these settings after installation:
#   sudo nano /usr/share/sddm/themes/lucidos/theme.conf
# =============================================================================

# Background image for the login screen
# Points to the LucidOS Lucid Glass wallpaper
Background=/usr/share/backgrounds/lucidos-wallpaper.svg

# Background scaling mode
# options: none, fit, fill, crop, tile, center
ScaleImageCropped=true

# Screen color — used if background fails to load
ScreenWidth=1920
ScreenHeight=1080

# Text and input colors
# These use the Lucid Glass color palette
MainColor=#e0e7ff
AccentColor=#6366f1
BackgroundColor=#0a1128
ErrorColor=#f87171

# Font settings
Font=Noto Sans
FontSize=11

# Clock settings
HourFormat=hh:mm
DateFormat=dddd, MMMM d

# Show user avatar in login form (if available)
# true = show circular avatar, false = hide
ShowUserAvatar=true

# Blur the background
# This requires KWin compositor — may not work in all environments
# TODO (Alpha 0.2): Implement blur effect properly
BlurBackground=true
BlurRadius=40
